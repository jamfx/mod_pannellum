MOD_PANNELLUM_FIELDSET_SCENES="Szenen & Hotspots"
MOD_PANNELLUM_FIELDSET_SCENES_DESC="Erstellen Sie mehrere verknüpfte Panoramen mit interaktiven Hotspots"
MOD_PANNELLUM_FIELDSET_DISPLAY="Anzeigeoptionen"

; ============================================
; MODUL BESCHREIBUNG
; ============================================
MOD_PANNELLUM_XML_DESCRIPTION="360° Panorama-Viewer mit Pannellum - Unterstützt Einzelpanoramen, Multi-Szenen mit Hotspots und umfassende Konfigurationsmöglichkeiten. Erstellen Sie interaktive 360°-Touren mit mehreren verknüpften Panoramen."

; ============================================
; ALLGEMEINE FELDER
; ============================================
MOD_PANNELLUM_FIELD_AUTOLOAD="Automatisch laden"
MOD_PANNELLUM_FIELD_HFOV="HFOV (Horizontales Sichtfeld)"
MOD_PANNELLUM_FIELD_NORTHOFFSET="Nord-Offset"
MOD_PANNELLUM_FIELD_PITCH="Pitch (Vertikale Neigung)"
MOD_PANNELLUM_FIELD_YAW="Yaw (Horizontale Drehung)"

; ============================================
; BESCHREIBUNGEN ALLGEMEINE FELDER
; ============================================
MOD_PANNELLUM_AUTOLOAD_DESC="Ja: Das Panorama wird sofort beim Seitenaufruf geladen und angezeigt. Nein: Es wird ein Lade-Button angezeigt, den Besucher anklicken müssen. Empfehlung: 'Ja' für bessere Benutzererfahrung, 'Nein' bei sehr großen Bilddateien zur Bandbreitenschonung."
MOD_PANNELLUM_HFOV_DESC="Bestimmt den Zoom-Level beim Start (Horizontal Field of View). Werte: 30° bis 120°. Niedrige Werte (30-50) = Starker Zoom, enge Ansicht. Mittlere Werte (80-100) = Normale Ansicht (empfohlen). Hohe Werte (100-120) = Weitwinkel, breite Übersicht. Standard: 100° bietet eine natürliche, ausgewogene Perspektive."
MOD_PANNELLUM_NORTHOFFSET_DESC="Rotation des Kompasses (falls aktiviert). Werte: 0° bis 360°. Korrigiert die Nordausrichtung, falls Ihr Panoramabild nicht nach echtem Norden ausgerichtet ist. Nur relevant, wenn Sie den Kompass in den erweiterten Einstellungen aktiviert haben."
MOD_PANNELLUM_PITCH_DESC="Legt die vertikale Ausgangsposition der Kamera fest (Auf-Ab-Neigung). Werte: -90° bis +90°. 0° = Horizontale Blickrichtung, negative Werte = Blick nach unten, positive Werte = Blick nach oben. Tipp: Ein Pitch von 0° ist meist ideal für eine natürliche Perspektive."
MOD_PANNELLUM_YAW_DESC="Legt die horizontale Ausgangsposition der Kamera fest (Links-Rechts-Drehung). Werte: -180° bis +180°. 0° = Bildmitte, negative Werte = Drehung nach links, positive Werte = Drehung nach rechts. Tipp: Nutzen Sie den Hotspot-Editor, um die gewünschte Position visuell zu bestimmen."

; ============================================
; ANZEIGEOPTIONEN
; ============================================
MOD_PANNELLUM_HEIGHT_UNIT="Höhen-Einheit"
MOD_PANNELLUM_HEIGHT_UNIT_DESC="Wählen Sie die Einheit für die Panorama-Höhe. Pixel (px) = Feste Höhe in Pixeln, empfohlen für konsistente Darstellung. Viewport Height (vh) = Prozentuale Höhe basierend auf der Bildschirmhöhe, ideal für responsive Designs."
MOD_PANNELLUM_HEIGHT_VALUE="Höhen-Wert"
MOD_PANNELLUM_HEIGHT_VALUE_DESC="Geben Sie die Höhe des Panorama-Viewers ein. Bei Pixel (px): 300-2000 empfohlen (Standard: 500px). Bei Viewport Height (vh): 30-100 empfohlen (z.B. 60 = 60% der Bildschirmhöhe). Die Höhe beeinflusst, wie viel Platz das Panorama auf der Seite einnimmt."

; ============================================
; BILDBESCHREIBUNG
; ============================================
MOD_PANNELLUM_SHOW_DESCRIPTION="Bildbeschreibung anzeigen"
MOD_PANNELLUM_SHOW_DESCRIPTION_DESC="Zeigt eine Bildbeschreibung als Overlay über dem Panorama an. Ideal für Bildunterschriften, Raumnamen oder kurze Erklärungen. Die Beschreibung kann oben oder unten positioniert werden und ist immer sichtbar."
MOD_PANNELLUM_DESCRIPTION_TEXT="Beschreibungstext"
MOD_PANNELLUM_DESCRIPTION_TEXT_DESC="Der Text, der in der Bildbeschreibung angezeigt wird. Beispiele: 'Wohnzimmer - 45m²', 'Meerblick vom Balkon', 'Historischer Marktplatz von 1850'. Halten Sie den Text kurz und prägnant für beste Lesbarkeit."

MOD_PANNELLUM_DESCRIPTION_POSITION="Position der Beschreibung"
MOD_PANNELLUM_DESCRIPTION_POSITION_DESC="Legt fest, wo die Bildbeschreibung angezeigt wird. Oben = Am oberen Rand des Panoramas (gut für wichtige Informationen, die sofort ins Auge fallen). Unten = Am unteren Rand des Panoramas (klassische Position für Bildunterschriften, weniger aufdringlich)."
MOD_PANNELLUM_POSITION_TOP="Oben"
MOD_PANNELLUM_POSITION_BOTTOM="Unten"

MOD_PANNELLUM_DESCRIPTION_TEXT_ALIGN="Textausrichtung"
MOD_PANNELLUM_DESCRIPTION_TEXT_ALIGN_DESC="Ausrichtung des Beschreibungstextes. Links = Linksbündig (klassisch für längere Texte). Mitte = Zentriert (elegant und ausgewogen, empfohlen für kurze Texte). Rechts = Rechtsbündig (ungewöhnlich, für besondere Designs)."
MOD_PANNELLUM_ALIGN_LEFT="Links"
MOD_PANNELLUM_ALIGN_CENTER="Mitte"
MOD_PANNELLUM_ALIGN_RIGHT="Rechts"

MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_VALUE="Schriftgröße (Wert)"
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_VALUE_DESC="Zahlenwert für die Schriftgröße. Empfohlene Werte: Pixel (px): 14-24 für normalen Text, 28-40 für Überschriften. Em/Rem: 1.0-1.5 für normalen Text, 1.8-2.5 für Überschriften. Standard: 18px bietet gute Lesbarkeit auf allen Geräten."
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_UNIT="Schriftgröße (Einheit)"
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_UNIT_DESC="Einheit für die Schriftgröße. Pixel (px) = Feste Größe, konsistent aber nicht responsiv. Em (em) = Relativ zur Elternschrift, skaliert mit Kontext. Rem (rem) = Relativ zur Wurzelschrift, skaliert global, empfohlen für responsive Designs."

MOD_PANNELLUM_DESCRIPTION_TEXT_COLOR="Textfarbe"
MOD_PANNELLUM_DESCRIPTION_TEXT_COLOR_DESC="Farbe des Beschreibungstextes. Standard: Weiß (#ffffff) funktioniert gut auf dunklen Hintergründen. Schwarz (#000000) für helle Hintergründe. Achten Sie auf ausreichenden Kontrast zur Hintergrundfarbe für optimale Lesbarkeit."
MOD_PANNELLUM_DESCRIPTION_BG_COLOR="Hintergrundfarbe"
MOD_PANNELLUM_DESCRIPTION_BG_COLOR_DESC="Hintergrundfarbe der Bildbeschreibung. Standard: Schwarz (#000000). Dunkle Farben (Schwarz, Dunkelgrau) sorgen für gute Lesbarkeit von weißem Text. Helle Farben (Weiß, Hellgrau) erfordern dunkle Textfarbe. Wählen Sie Farben passend zu Ihrem Website-Design."
MOD_PANNELLUM_DESCRIPTION_BG_OPACITY="Hintergrund-Transparenz"
MOD_PANNELLUM_DESCRIPTION_BG_OPACITY_DESC="Transparenz des Beschreibungshintergrunds (0.0 = vollständig transparent/unsichtbar, 1.0 = vollständig deckend/opak). Standard: 0.7 (70% Deckkraft) bietet gute Balance zwischen Lesbarkeit und Durchsicht auf das Panorama. Niedrigere Werte (0.3-0.6) = Mehr Transparenz, subtiler. Höhere Werte (0.8-1.0) = Mehr Deckkraft, bessere Lesbarkeit."

; ============================================
; SCHATTENWURF / DROP SHADOW
; ============================================
MOD_PANNELLUM_SHADOW_ENABLED="Schattenwurf aktivieren"
MOD_PANNELLUM_SHADOW_ENABLED_DESC="Fügt einen Schatten um das gesamte Panorama hinzu. Erzeugt einen 3D-Effekt und hebt das Panorama vom Hintergrund ab. Besonders wirkungsvoll auf hellen oder gemusterten Hintergründen. Empfohlen für ein modernes, schwebendes Design."

MOD_PANNELLUM_SHADOW_HORIZONTAL="Horizontaler Versatz"
MOD_PANNELLUM_SHADOW_HORIZONTAL_DESC="Horizontale Verschiebung des Schattens in Pixeln. Negative Werte = Schatten nach links. 0 = Kein horizontaler Versatz (Schatten direkt unter dem Element). Positive Werte = Schatten nach rechts. Empfehlung: 0px für gleichmäßigen Schatten, 2-5px für dezenten seitlichen Effekt."
MOD_PANNELLUM_SHADOW_VERTICAL="Vertikaler Versatz"
MOD_PANNELLUM_SHADOW_VERTICAL_DESC="Vertikale Verschiebung des Schattens in Pixeln. Negative Werte = Schatten nach oben. 0 = Kein vertikaler Versatz. Positive Werte = Schatten nach unten (natürlicher Lichteinfall von oben). Empfehlung: 2-6px für natürlichen Schattenwurf von oben."
MOD_PANNELLUM_SHADOW_BLUR="Weichzeichnung"
MOD_PANNELLUM_SHADOW_BLUR_DESC="Stärke der Weichzeichnung des Schattens in Pixeln. 0 = Scharfer, harter Schatten. Niedrige Werte (2-8px) = Dezenter, feiner Schatten. Mittlere Werte (10-20px) = Weicher, natürlicher Schatten (empfohlen). Hohe Werte (30-100px) = Sehr weicher, großflächiger Schatten."
MOD_PANNELLUM_SHADOW_SPREAD="Ausbreitung"
MOD_PANNELLUM_SHADOW_SPREAD_DESC="Vergrößert oder verkleinert den Schatten in Pixeln. Negative Werte = Schatten kleiner als das Element. 0 = Schatten gleich groß wie das Element. Positive Werte = Schatten größer als das Element. Empfehlung: 0px für natürlichen Schatten, 1-3px für betonten Rahmeneffekt."
MOD_PANNELLUM_SHADOW_COLOR="Schattenfarbe"
MOD_PANNELLUM_SHADOW_COLOR_DESC="Farbe des Schattens. Standard: Schwarz (#000000). Dunkle Farben (Schwarz, Dunkelgrau) = Klassischer Schatten. Farbige Schatten (z.B. Dunkelblau #003366) = Moderner, kreativer Effekt. Helle Farben = Glow-Effekt (Leuchteffekt). Die tatsächliche Sichtbarkeit wird durch die Transparenz gesteuert."
MOD_PANNELLUM_SHADOW_OPACITY="Schatten-Transparenz"
MOD_PANNELLUM_SHADOW_OPACITY_DESC="Transparenz des Schattens (0.0 = unsichtbar, 1.0 = vollständig deckend). Standard: 0.3 (30% Deckkraft) bietet einen dezenten, natürlichen Schatten. Niedrige Werte (0.1-0.2) = Sehr subtiler Schatten. Mittlere Werte (0.3-0.5) = Deutlich sichtbar (empfohlen). Hohe Werte (0.6-1.0) = Sehr kräftiger, dominanter Schatten."

; ============================================
; KOMPASS & NAVIGATION
; ============================================
MOD_PANNELLUM_SHOW_COMPASS="Kompass anzeigen"
MOD_PANNELLUM_SHOW_COMPASS_DESC="Zeigt einen Kompass im Panorama-Viewer an. Der Kompass dreht sich mit der aktuellen Blickrichtung und hilft Besuchern bei der Orientierung. Besonders nützlich für Außenpanoramen oder Immobilien-Touren, bei denen die Himmelsrichtung relevant ist."
MOD_PANNELLUM_SHOW_GYRO="Gyroskop-Button anzeigen"
MOD_PANNELLUM_SHOW_GYRO_DESC="Zeigt einen Button für die Gyroskop-Steuerung auf mobilen Geräten an. Wenn aktiviert, können Besucher das Panorama durch physisches Drehen ihres Smartphones/Tablets steuern - ein sehr intuitives und immersives Erlebnis. Funktioniert nur auf Geräten mit Bewegungssensoren (Smartphones, Tablets)."

; ============================================
; AUTO-ROTATION
; ============================================
MOD_PANNELLUM_AUTO_ROTATE="Auto-Rotation aktivieren"
MOD_PANNELLUM_AUTO_ROTATE_DESC="Dreht das Panorama automatisch, wenn der Besucher es nicht aktiv bedient. Erzeugt einen lebendigen, einladenden Eindruck. Die Rotation stoppt automatisch, sobald der Besucher das Panorama berührt oder per Maus bedient."
MOD_PANNELLUM_AUTO_ROTATE_SPEED="Rotationsgeschwindigkeit"
MOD_PANNELLUM_AUTO_ROTATE_SPEED_DESC="Geschwindigkeit der automatischen Rotation in Grad pro Sekunde. Positive Werte = Drehung nach rechts, negative Werte = Drehung nach links. Empfehlung: 1-3 für langsame, angenehme Rotation. Höhere Werte können bei empfindlichen Personen Unwohlsein verursachen."
MOD_PANNELLUM_AUTO_ROTATE_DELAY="Verzögerung vor Rotation"
MOD_PANNELLUM_AUTO_ROTATE_DELAY_DESC="Wartezeit in Millisekunden, bevor die automatische Rotation startet. 0 = Sofort. 3000 = Nach 3 Sekunden (empfohlen, gibt Besuchern Zeit zur Orientierung). 10000 = Nach 10 Sekunden. Die Verzögerung gilt auch nach jeder Benutzerinteraktion, bevor die Rotation wieder einsetzt."

; ============================================
; HOTSPOT FELDER
; ============================================
MOD_PANNELLUM_FIELD_HOTSPOT_TYPE="Hotspot-Typ"
MOD_PANNELLUM_FIELD_HOTSPOT_PITCH="Pitch (Vertikal)"
MOD_PANNELLUM_FIELD_HOTSPOT_YAW="Yaw (Horizontal)"
MOD_PANNELLUM_FIELD_HOTSPOT_TARGET_SCENE="Ziel-Scene-ID"
MOD_PANNELLUM_FIELD_HOTSPOT_TEXT="Text / HTML-Inhalt"
MOD_PANNELLUM_FIELD_HOTSPOT_ICON="Icon (Font Awesome)"
MOD_PANNELLUM_FIELD_ICON_COLOR="Icon-Farbe"
MOD_PANNELLUM_FIELD_ICON_SIZE="Icon-Größe (px)"
MOD_PANNELLUM_FIELD_BOX_WIDTH="Info-Box Breite (%)"
MOD_PANNELLUM_FIELD_BOX_HEIGHT="Info-Box Höhe (%)"

; ============================================
; HOTSPOT BESCHREIBUNGEN
; ============================================
MOD_PANNELLUM_FIELD_BOX_HEIGHT_DESC="Höhe der Info-Box als Prozentsatz des Panorama-Viewers. Werte: 20% bis 80%. 40% = Standard. Passen Sie die Höhe an Ihren Inhalt an. Bei viel Text: größere Werte wählen. Nur für Info-Hotspots relevant."
MOD_PANNELLUM_FIELD_BOX_WIDTH_DESC="Breite der Info-Box als Prozentsatz des Panorama-Viewers. Werte: 20% bis 80%. 40% = Standard, gute Balance. Kleinere Werte = Kompakte Box, mehr Panorama sichtbar. Größere Werte = Mehr Platz für Inhalt. Nur für Info-Hotspots relevant."
MOD_PANNELLUM_FIELD_HOTSPOT_ICON_DESC="Font Awesome Icon für diesen Hotspot. Wählen Sie ein passendes Icon: icon-arrow-right = Pfeil nach rechts (Navigation), icon-door-open = Tür (Raumwechsel), icon-info = Info-Symbol, icon-star = Stern (Highlight), icon-location = Standort-Marker. Vollständige Liste: fontawesome.com/icons. Format: 'icon-' + Icon-Name (z.B. 'icon-home', 'icon-camera')"
MOD_PANNELLUM_FIELD_HOTSPOT_PITCH_DESC="Vertikale Position des Hotspots im Panorama. Werte: -90° bis +90°. 0° = Augenhöhe (Horizont), negative Werte = Unterhalb der Augenhöhe (Boden), positive Werte = Oberhalb der Augenhöhe (Decke). Nutzen Sie den Hotspot-Editor: Klicken Sie im Panorama auf die gewünschte Stelle, und die Koordinaten werden automatisch eingetragen."
MOD_PANNELLUM_FIELD_HOTSPOT_TARGET_SCENE_DESC="Scene-ID der Zielszene, zu der dieser Hotspot führt. Geben Sie die exakte Scene-ID ein (z.B. 'wohnzimmer', 'kueche'). Wichtig: Die Scene-ID muss existieren und exakt übereinstimmen (Groß-/Kleinschreibung beachten!). Tipp: Kopieren Sie die Scene-ID aus dem entsprechenden Szenen-Eintrag."
MOD_PANNELLUM_FIELD_HOTSPOT_TEXT_DESC="Bei Info-Hotspots: Der komplette Inhalt der Info-Box. Unterstützt HTML, Bilder, Listen, Formatierungen. Nutzen Sie den Editor für einfache Formatierung. Bei Szenen-Hotspots: Wird als Tooltip beim Hover angezeigt. Kurze Beschreibung (z.B. 'Zur Küche', 'Balkon'). Beispiel Info-Box: Produktbeschreibungen, historische Infos, Wegbeschreibungen"
MOD_PANNELLUM_FIELD_HOTSPOT_TYPE_DESC="Szenen-Link: Navigation zu einer anderen Szene. Besucher können durch Klick zu einem anderen Panorama wechseln. Erfordert 'Ziel-Scene-ID'. Info-Punkt: Zeigt Informationen an. Öffnet eine Overlay-Box mit Ihrem Text/HTML-Inhalt. Ideal für Erklärungen, Produktinfos, Geschichten."
MOD_PANNELLUM_FIELD_HOTSPOT_YAW_DESC="Horizontale Position des Hotspots im Panorama. Werte: -180° bis +180°. 0° = Bildmitte, negative Werte = Links von der Mitte, positive Werte = Rechts von der Mitte. Am einfachsten: Hotspot-Editor verwenden und visuell platzieren!"
MOD_PANNELLUM_FIELD_ICON_COLOR_DESC="Farbe des Icons im HEX-Format. Beispiele: #0066cc = Blau (Standard), #28a745 = Grün, #dc3545 = Rot, #ffc107 = Gelb/Gold. Wählen Sie Farben passend zu Ihrem Design und zur Funktion des Hotspots."
MOD_PANNELLUM_FIELD_ICON_SIZE_DESC="Größe des Icons in Pixeln. Werte: 12px bis 60px. 20px = Standard, gut lesbar. Kleinere Werte = Dezenter, weniger auffällig. Größere Werte = Auffälliger, besser sichtbar. Empfehlung: 18-24px für normale Hotspots, 28-40px für wichtige Highlights."

; ============================================
; SZENEN FELDER
; ============================================
MOD_PANNELLUM_FIELD_SCENE_ID="Szenen-ID"
MOD_PANNELLUM_FIELD_SCENE_IMAGE_DESC="Wählen Sie das 360°-Panoramabild für diese Szene. Format: Equirectangular (2:1 Seitenverhältnis). Empfohlene Auflösung: 4096x2048 Pixel oder höher. Jede Szene benötigt ihr eigenes Panoramabild."
MOD_PANNELLUM_FIELD_SCENE_ID_DESC="Eindeutige Kennung für diese Szene - wird für die Navigation zwischen Szenen verwendet. Wichtig: Nur Kleinbuchstaben, Zahlen, Bindestriche und Unterstriche. Keine Leerzeichen oder Sonderzeichen. Muss eindeutig sein (keine doppelten IDs). Beispiele: 'wohnzimmer', 'kueche-sued', 'balkon_01'. Diese ID wird in Hotspots als 'Ziel-Scene-ID' verwendet, um Szenen zu verknüpfen."

MOD_PANNELLUM_SHOW_SCENE_TITLE="Szenen-Titel anzeigen"
MOD_PANNELLUM_SHOW_SCENE_TITLE_DESC="Zeigt den Titel der Szene in Pannellum an. Der Titel erscheint kurz beim Laden der Szene oben links im Viewer und kann vom Benutzer durch Klick wieder ausgeblendet werden. Nützlich für Orientierung in großen Touren mit vielen Szenen."
MOD_PANNELLUM_FIELD_SCENE_TITLE="Szenen-Titel"
MOD_PANNELLUM_FIELD_SCENE_TITLE_DESC="Der Titel dieser Szene, der dem Besucher angezeigt wird. Kann Leerzeichen und Sonderzeichen enthalten. Beispiele: 'Wohnzimmer', 'Küche (Südseite)', 'Balkon mit Meerblick'. Wird nur angezeigt, wenn 'Szenen-Titel anzeigen' aktiviert ist."

