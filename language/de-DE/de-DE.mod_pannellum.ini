MOD_PANNELLUM_CONFIG_MISSING_DESC="Bitte konfigurieren Sie das Modul im Backend, um ein 360° Panorama anzuzeigen."
MOD_PANNELLUM_CONFIG_MISSING_TITLE="Pannellum-Modul noch nicht konfiguriert"
MOD_PANNELLUM_CONFIG_STEP1="Öffnen Sie das Modul im Backend (Content → Site Modules)"
MOD_PANNELLUM_CONFIG_STEP2="Wählen Sie einen Anzeigemodus (Einzelnes Panorama oder Mehrere Szenen)"
MOD_PANNELLUM_CONFIG_STEP3="Laden Sie mindestens ein Panoramabild hoch oder fügen Sie Szenen hinzu"
MOD_PANNELLUM_CONFIG_STEPS="Konfigurationsschritte:"

; ============================================
; MODUS
; ============================================
MOD_PANNELLUM_MODE_DESC="Einzelnes Panorama: Zeigt ein einzelnes 360°-Bild mit optionalen Hotspots an. Mehrere Szenen: Erstellen Sie eine interaktive Tour mit mehreren verbundenen Panoramen und Navigations-Hotspots zwischen den Szenen."
MOD_PANNELLUM_MODE_LABEL="Anzeigemodus"
MOD_PANNELLUM_MODE_MULTI="Mehrere Szenen"
MOD_PANNELLUM_MODE_SINGLE="Einzeles Panorama"

; ============================================
; SZENEN
; ============================================
MOD_PANNELLUM_SCENE_HFOV_DESC="Zoom-Level beim Betreten dieser Szene. Jede Szene kann einen eigenen Zoom-Level haben. Standard: 100°"
MOD_PANNELLUM_SCENE_HOTSPOTS_DESC="Interaktive Punkte in dieser Szene. Szenen-Links: Zum Wechseln zu anderen Szenen. Geben Sie die 'Ziel-Scene-ID' der gewünschten Szene ein. Ideal für Türen, Durchgänge, Verbindungen. Info-Punkte: Für Informationen und HTML-Inhalte. Können Texte, Bilder, Videos enthalten. Größe der Info-Box anpassbar. Verwenden Sie den Hotspot-Editor, um Positionen visuell zu setzen!"
MOD_PANNELLUM_SCENE_IMAGE="Panoramabild"
MOD_PANNELLUM_SCENE_PITCH_DESC="Vertikale Startposition der Kamera in dieser Szene. 0° ist die Standard-Augenhöhe und meist die beste Wahl."
MOD_PANNELLUM_SCENE_TITLE_DESC="Anzeigename dieser Szene, der dem Besucher angezeigt wird. Kann Leerzeichen und Sonderzeichen enthalten. Beispiele: 'Wohnzimmer', 'Küche (Südseite)', 'Balkon mit Meerblick'"
MOD_PANNELLUM_SCENE_YAW_DESC="Horizontale Startposition der Kamera in dieser Szene. Legt fest, in welche Richtung Besucher beim Betreten der Szene schauen. Tipp: Richten Sie die Kamera auf markante Punkte oder wichtige Hotspots aus."
MOD_PANNELLUM_SCENES_DESC="Erstellen Sie eine interaktive 360°-Tour mit mehreren Panoramen: 1. Fügen Sie Szenen hinzu für jeden Raum/Ort. 2. Vergeben Sie eindeutige Scene-IDs (z.B. 'wohnzimmer', 'kueche'). 3. Laden Sie Panoramabilder hoch für jede Szene. 4. Verbinden Sie Szenen mit Hotspots (Typ: 'Szenen-Link'). Die erste Szene wird automatisch als Startpunkt verwendet."
MOD_PANNELLUM_SCENES_LABEL="Szenen"

; ============================================
; SINGLE MODE
; ============================================
MOD_PANNELLUM_SINGLE_HOTSPOTS_DESC="Fügen Sie interaktive Punkte in Ihr Panorama ein. Szenen-Hotspots: Ermöglichen Navigation zwischen verschiedenen Panoramen (nur im Multi-Szenen-Modus sinnvoll). Info-Hotspots: Zeigen Informationen, Texte, Bilder oder HTML-Inhalte an. Tipp: Verwenden Sie den 'Hotspot-Editor', um Positionen visuell zu platzieren, anstatt Koordinaten manuell einzugeben."
MOD_PANNELLUM_SINGLE_IMAGE_DESC="Wählen Sie ein 360°-Panoramabild im Equirectangular-Format (auch bekannt als sphärisches oder Kugelpanorama). Empfohlenes Seitenverhältnis: 2:1 (z.B. 4096x2048 Pixel). Das Bild sollte eine komplette 360° × 180° Rundumsicht zeigen."
