MOD_PANNELLUM_HOTSPOT_EDITOR_BUTTON_DESC="Öffnet den visuellen Hotspot-Editor. Ermöglicht das Platzieren von Hotspots durch Klicken direkt im Panorama-Bild."
MOD_PANNELLUM_HOTSPOT_EDITOR_HINT="So verwenden Sie den Hotspot-Editor: 1. Laden Sie zuerst ein Panoramabild hoch. 2. Klicken Sie auf 'Hotspot-Editor öffnen'. 3. Klicken Sie im Panorama auf die gewünschte Position. 4. Die Koordinaten (Pitch/Yaw) werden automatisch übernommen. 5. Schließen Sie den Editor und konfigurieren Sie den Hotspot weiter. Viel einfacher als manuelle Koordinaten-Eingabe!"
MOD_PANNELLUM_HOTSPOT_EDITOR_OPEN="Hotspot-Editor öffnen"

