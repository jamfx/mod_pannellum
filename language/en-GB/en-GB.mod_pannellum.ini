; FRONTEND
; ============================================
MOD_PANNELLUM_GYRO_BUTTON="Activate Gyro Control"

; ============================================
; HOTSPOT EDITOR
; ============================================
MOD_PANNELLUM_HOTSPOT_EDITOR_BUTTON_DESC="Opens the visual hotspot editor. Allows placing hotspots by clicking directly in the panorama image."
MOD_PANNELLUM_HOTSPOT_EDITOR_HINT="How to use the Hotspot Editor: 1. First upload a panorama image. 2. Click 'Open Hotspot Editor'. 3. Click in the panorama on the desired position. 4. Coordinates (Pitch/Yaw) are automatically transferred. 5. Close the editor and continue configuring the hotspot. Much easier than manual coordinate entry!"
MOD_PANNELLUM_HOTSPOT_EDITOR_OPEN="Open Hotspot Editor"

