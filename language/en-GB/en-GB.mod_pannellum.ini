; ============================================
; FIELDSETS
; ============================================
MOD_PANNELLUM_FIELDSET_BASIC="Basic Settings"
MOD_PANNELLUM_FIELDSET_SCENES="Scenes & Hotspots"
MOD_PANNELLUM_FIELDSET_SCENES_DESC="Create multiple linked panoramas with interactive hotspots"
MOD_PANNELLUM_FIELDSET_DISPLAY="Display Options"

; ============================================
; MODULE DESCRIPTION
; ============================================
MOD_PANNELLUM_XML_DESCRIPTION="360° Panorama viewer with Pannellum - Supports single panoramas, multi-scene tours with hotspots and comprehensive configuration options. Create interactive 360° tours with multiple linked panoramas."

; ============================================
; GENERAL FIELDS
; ============================================
MOD_PANNELLUM_FIELD_AUTOLOAD="Auto Load"
MOD_PANNELLUM_FIELD_HFOV="HFOV (Horizontal Field of View)"
MOD_PANNELLUM_FIELD_NORTHOFFSET="North Offset"
MOD_PANNELLUM_FIELD_PITCH="Pitch (Vertical Tilt)"
MOD_PANNELLUM_FIELD_YAW="Yaw (Horizontal Rotation)"

; ============================================
; GENERAL FIELD DESCRIPTIONS
; ============================================
MOD_PANNELLUM_AUTOLOAD_DESC="Yes: The panorama loads and displays immediately when the page loads. No: A load button is shown that visitors must click. Recommendation: 'Yes' for better user experience, 'No' for very large image files to save bandwidth."
MOD_PANNELLUM_HFOV_DESC="Determines the initial zoom level (Horizontal Field of View). Values: 30° to 120°. Low values (30-50) = Strong zoom, narrow view. Medium values (80-100) = Normal view (recommended). High values (100-120) = Wide angle, broad overview. Default: 100° provides a natural, balanced perspective."
MOD_PANNELLUM_NORTHOFFSET_DESC="Compass rotation (if enabled). Values: 0° to 360°. Corrects the north alignment if your panorama image is not oriented to true north. Only relevant if you've enabled the compass in advanced settings."
MOD_PANNELLUM_PITCH_DESC="Sets the initial vertical camera position (up-down tilt). Values: -90° to +90°. 0° = Horizontal view direction, negative values = looking down, positive values = looking up. Tip: A pitch of 0° is usually ideal for a natural perspective."
MOD_PANNELLUM_YAW_DESC="Sets the initial horizontal camera position (left-right rotation). Values: -180° to +180°. 0° = Center of image, negative values = rotation to the left, positive values = rotation to the right. Tip: Use the Hotspot Editor to visually determine the desired position."

; ============================================
; DISPLAY OPTIONS
; ============================================
MOD_PANNELLUM_HEIGHT_UNIT="Height Unit"
MOD_PANNELLUM_HEIGHT_UNIT_DESC="Choose the unit for the panorama height. Pixel (px) = Fixed height in pixels, recommended for consistent display. Viewport Height (vh) = Percentage height based on screen height, ideal for responsive designs."
MOD_PANNELLUM_HEIGHT_VALUE="Height Value"
MOD_PANNELLUM_HEIGHT_VALUE_DESC="Enter the height of the panorama viewer. For Pixels (px): 300-2000 recommended (Default: 500px). For Viewport Height (vh): 30-100 recommended (e.g., 60 = 60% of screen height). Height affects how much space the panorama occupies on the page."

; ============================================
; IMAGE DESCRIPTION
; ============================================
MOD_PANNELLUM_SHOW_DESCRIPTION="Show Image Description"
MOD_PANNELLUM_SHOW_DESCRIPTION_DESC="Displays an image description as an overlay on the panorama. Ideal for captions, room names, or brief explanations. The description can be positioned at the top or bottom and is always visible."
MOD_PANNELLUM_DESCRIPTION_TEXT="Description Text"
MOD_PANNELLUM_DESCRIPTION_TEXT_DESC="The text displayed in the image description. Examples: 'Living Room - 45m²', 'Ocean View from Balcony', 'Historic Market Square from 1850'. Keep the text short and concise for best readability."

MOD_PANNELLUM_DESCRIPTION_POSITION="Description Position"
MOD_PANNELLUM_DESCRIPTION_POSITION_DESC="Determines where the image description is displayed. Top = At the top edge of the panorama (good for important information that catches the eye immediately). Bottom = At the bottom edge of the panorama (classic position for captions, less obtrusive)."
MOD_PANNELLUM_POSITION_TOP="Top"
MOD_PANNELLUM_POSITION_BOTTOM="Bottom"

MOD_PANNELLUM_DESCRIPTION_TEXT_ALIGN="Text Alignment"
MOD_PANNELLUM_DESCRIPTION_TEXT_ALIGN_DESC="Alignment of the description text. Left = Left-aligned (classic for longer texts). Center = Centered (elegant and balanced, recommended for short texts). Right = Right-aligned (unusual, for special designs)."
MOD_PANNELLUM_ALIGN_LEFT="Left"
MOD_PANNELLUM_ALIGN_CENTER="Center"
MOD_PANNELLUM_ALIGN_RIGHT="Right"

MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_VALUE="Font Size (Value)"
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_VALUE_DESC="Numeric value for the font size. Recommended values: Pixels (px): 14-24 for normal text, 28-40 for headings. Em/Rem: 1.0-1.5 for normal text, 1.8-2.5 for headings. Default: 18px provides good readability on all devices."
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_UNIT="Font Size (Unit)"
MOD_PANNELLUM_DESCRIPTION_FONT_SIZE_UNIT_DESC="Unit for the font size. Pixel (px) = Fixed size, consistent but not responsive. Em (em) = Relative to parent font, scales with context. Rem (rem) = Relative to root font, scales globally, recommended for responsive designs."

MOD_PANNELLUM_DESCRIPTION_TEXT_COLOR="Text Color"
MOD_PANNELLUM_DESCRIPTION_TEXT_COLOR_DESC="Color of the description text. Default: White (#ffffff) works well on dark backgrounds. Black (#000000) for light backgrounds. Ensure sufficient contrast with the background color for optimal readability."
MOD_PANNELLUM_DESCRIPTION_BG_COLOR="Background Color"
MOD_PANNELLUM_DESCRIPTION_BG_COLOR_DESC="Background color of the image description. Default: Black (#000000). Dark colors (black, dark gray) ensure good readability of white text. Light colors (white, light gray) require dark text color. Choose colors matching your website design."
MOD_PANNELLUM_DESCRIPTION_BG_OPACITY="Background Opacity"
MOD_PANNELLUM_DESCRIPTION_BG_OPACITY_DESC="Transparency of the description background (0.0 = fully transparent/invisible, 1.0 = fully opaque). Default: 0.7 (70% opacity) offers good balance between readability and view of the panorama. Lower values (0.3-0.6) = More transparency, more subtle. Higher values (0.8-1.0) = More opacity, better readability."

; ============================================
; DROP SHADOW
; ============================================
MOD_PANNELLUM_SHADOW_ENABLED="Enable Drop Shadow"
MOD_PANNELLUM_SHADOW_ENABLED_DESC="Adds a shadow around the entire panorama. Creates a 3D effect and lifts the panorama from the background. Especially effective on light or patterned backgrounds. Recommended for a modern, floating design."

MOD_PANNELLUM_SHADOW_HORIZONTAL="Horizontal Offset"
MOD_PANNELLUM_SHADOW_HORIZONTAL_DESC="Horizontal shift of the shadow in pixels. Negative values = Shadow to the left. 0 = No horizontal offset (shadow directly beneath the element). Positive values = Shadow to the right. Recommendation: 0px for even shadow, 2-5px for subtle side effect."
MOD_PANNELLUM_SHADOW_VERTICAL="Vertical Offset"
MOD_PANNELLUM_SHADOW_VERTICAL_DESC="Vertical shift of the shadow in pixels. Negative values = Shadow upwards. 0 = No vertical offset. Positive values = Shadow downwards (natural light from above). Recommendation: 2-6px for natural shadow cast from above."
MOD_PANNELLUM_SHADOW_BLUR="Blur Radius"
MOD_PANNELLUM_SHADOW_BLUR_DESC="Blur intensity of the shadow in pixels. 0 = Sharp, hard shadow. Low values (2-8px) = Subtle, fine shadow. Medium values (10-20px) = Soft, natural shadow (recommended). High values (30-100px) = Very soft, widespread shadow."
MOD_PANNELLUM_SHADOW_SPREAD="Spread"
MOD_PANNELLUM_SHADOW_SPREAD_DESC="Enlarges or shrinks the shadow in pixels. Negative values = Shadow smaller than the element. 0 = Shadow same size as element. Positive values = Shadow larger than element. Recommendation: 0px for natural shadow, 1-3px for emphasized frame effect."
MOD_PANNELLUM_SHADOW_COLOR="Shadow Color"
MOD_PANNELLUM_SHADOW_COLOR_DESC="Color of the shadow. Default: Black (#000000). Dark colors (black, dark gray) = Classic shadow. Colored shadows (e.g., dark blue #003366) = Modern, creative effect. Light colors = Glow effect. Actual visibility is controlled by the opacity setting."
MOD_PANNELLUM_SHADOW_OPACITY="Shadow Opacity"
MOD_PANNELLUM_SHADOW_OPACITY_DESC="Transparency of the shadow (0.0 = invisible, 1.0 = fully opaque). Default: 0.3 (30% opacity) provides a subtle, natural shadow. Low values (0.1-0.2) = Very subtle shadow. Medium values (0.3-0.5) = Clearly visible (recommended). High values (0.6-1.0) = Very strong, dominant shadow."

; ============================================
; COMPASS & NAVIGATION
; ============================================
MOD_PANNELLUM_SHOW_COMPASS="Show Compass"
MOD_PANNELLUM_SHOW_COMPASS_DESC="Displays a compass in the panorama viewer. The compass rotates with the current viewing direction and helps visitors with orientation. Especially useful for outdoor panoramas or real estate tours where cardinal direction is relevant."
MOD_PANNELLUM_SHOW_GYRO="Show Gyroscope Button"
MOD_PANNELLUM_SHOW_GYRO_DESC="Displays a button for gyroscope control on mobile devices. When activated, visitors can control the panorama by physically rotating their smartphone/tablet - a very intuitive and immersive experience. Only works on devices with motion sensors (smartphones, tablets)."

; ============================================
; AUTO-ROTATION
; ============================================
MOD_PANNELLUM_AUTO_ROTATE="Enable Auto-Rotation"
MOD_PANNELLUM_AUTO_ROTATE_DESC="Rotates the panorama automatically when the visitor is not actively interacting. Creates a lively, inviting impression. Rotation stops automatically when the visitor touches the panorama or uses the mouse."
MOD_PANNELLUM_AUTO_ROTATE_SPEED="Rotation Speed"
MOD_PANNELLUM_AUTO_ROTATE_SPEED_DESC="Speed of automatic rotation in degrees per second. Positive values = clockwise rotation, negative values = counter-clockwise rotation. Recommendation: 1-3 for slow, pleasant rotation. Higher values may cause discomfort for sensitive viewers."
MOD_PANNELLUM_AUTO_ROTATE_DELAY="Delay Before Rotation"
MOD_PANNELLUM_AUTO_ROTATE_DELAY_DESC="Wait time in milliseconds before automatic rotation starts. 0 = Immediately. 3000 = After 3 seconds (recommended, gives visitors time to orient). 10000 = After 10 seconds. The delay also applies after each user interaction before rotation resumes."

; ============================================
; HOTSPOT FIELDS
; ============================================
MOD_PANNELLUM_FIELD_HOTSPOT_TYPE="Hotspot Type"
MOD_PANNELLUM_FIELD_HOTSPOT_PITCH="Pitch (Vertical)"
MOD_PANNELLUM_FIELD_HOTSPOT_YAW="Yaw (Horizontal)"
MOD_PANNELLUM_FIELD_HOTSPOT_TARGET_SCENE="Target Scene ID"
MOD_PANNELLUM_FIELD_HOTSPOT_TEXT="Text / HTML Content"
MOD_PANNELLUM_FIELD_HOTSPOT_ICON="Icon (Font Awesome)"
MOD_PANNELLUM_FIELD_ICON_COLOR="Icon Color"
MOD_PANNELLUM_FIELD_ICON_SIZE="Icon Size (px)"
MOD_PANNELLUM_FIELD_BOX_WIDTH="Info Box Width (%)"
MOD_PANNELLUM_FIELD_BOX_HEIGHT="Info Box Height (%)"

; ============================================
; HOTSPOT DESCRIPTIONS
; ============================================
MOD_PANNELLUM_FIELD_BOX_HEIGHT_DESC="Height of the info box as percentage of the panorama viewer. Values: 20% to 80%. 40% = Default. Adjust height to fit your content. For lots of text: choose larger values. Only for info hotspots."
MOD_PANNELLUM_FIELD_BOX_WIDTH_DESC="Width of the info box as percentage of the panorama viewer. Values: 20% to 80%. 40% = Default, good balance. Smaller values = Compact box, more panorama visible. Larger values = More space for content. Only relevant for info hotspots."
MOD_PANNELLUM_FIELD_HOTSPOT_ICON_DESC="Font Awesome Icon for this hotspot. Choose an appropriate icon: icon-arrow-right = Arrow right (navigation), icon-door-open = Door (room change), icon-info = Info symbol, icon-star = Star (highlight), icon-location = Location marker. Complete list: fontawesome.com/icons. Format: 'icon-' + icon-name (e.g., 'icon-home', 'icon-camera')"
MOD_PANNELLUM_FIELD_HOTSPOT_PITCH_DESC="Vertical position of the hotspot in the panorama. Values: -90° to +90°. 0° = Eye level (horizon), negative values = below eye level (floor), positive values = above eye level (ceiling). Use the Hotspot Editor: Click on the desired spot in the panorama and coordinates will be automatically entered."
MOD_PANNELLUM_FIELD_HOTSPOT_TARGET_SCENE_DESC="Scene ID of the target scene that this hotspot leads to. Enter the exact Scene ID (e.g., 'livingroom', 'kitchen'). Important: The Scene ID must exist and match exactly (case-sensitive!). Tip: Copy the Scene ID from the corresponding scene entry."
MOD_PANNELLUM_FIELD_HOTSPOT_TEXT_DESC="For Info Hotspots: The complete content of the info box. Supports HTML, images, lists, formatting. Use the editor for easy formatting. For Scene Hotspots: Displayed as tooltip on hover. Short description (e.g., 'To Kitchen', 'Balcony'). Info Box Example: Product descriptions, historical information, directions"
MOD_PANNELLUM_FIELD_HOTSPOT_TYPE_DESC="Scene Link: Navigation to another scene. Visitors can click to switch to another panorama. Requires 'Target Scene ID'. Info Point: Displays information. Opens an overlay box with your text/HTML content. Ideal for explanations, product information, stories."
MOD_PANNELLUM_FIELD_HOTSPOT_YAW_DESC="Horizontal position of the hotspot in the panorama. Values: -180° to +180°. 0° = Image center, negative values = left of center, positive values = right of center. Easiest way: Use the Hotspot Editor and place visually!"
MOD_PANNELLUM_FIELD_ICON_COLOR_DESC="Color of the icon in HEX format. Examples: #0066cc = Blue (default), #28a745 = Green, #dc3545 = Red, #ffc107 = Yellow/Gold. Choose colors matching your design and the hotspot's function."
MOD_PANNELLUM_FIELD_ICON_SIZE_DESC="Size of the icon in pixels. Values: 12px to 60px. 20px = Default, clearly readable. Smaller values = More subtle, less prominent. Larger values = More prominent, better visible. Recommendation: 18-24px for normal hotspots, 28-40px for important highlights."

; ============================================
; SCENE FIELDS
; ============================================
MOD_PANNELLUM_FIELD_SCENE_ID="Scene ID"
MOD_PANNELLUM_FIELD_SCENE_IMAGE_DESC="Select the 360° panorama image for this scene. Format: Equirectangular (2:1 aspect ratio). Recommended resolution: 4096x2048 pixels or higher. Each scene needs its own panorama image."
MOD_PANNELLUM_FIELD_SCENE_ID_DESC="Unique identifier for this scene - used for navigation between scenes. Important: Only lowercase letters, numbers, hyphens, and underscores. No spaces or special characters. Must be unique (no duplicate IDs). Examples: 'livingroom', 'kitchen-south', 'balcony_01'. This ID is used in hotspots as 'Target Scene ID' to link scenes."

MOD_PANNELLUM_SHOW_SCENE_TITLE="Show Scene Title"
MOD_PANNELLUM_SHOW_SCENE_TITLE_DESC="Displays the scene title in Pannellum viewer. The title appears briefly when loading the scene in the upper left of the viewer and can be hidden again by the user. Useful for orientation in large tours with many scenes."
MOD_PANNELLUM_FIELD_SCENE_TITLE="Scene Title"
MOD_PANNELLUM_FIELD_SCENE_TITLE_DESC="The title of this scene displayed to visitors. Can contain spaces and special characters. Examples: 'Living Room', 'Kitchen (South Side)', 'Balcony with Ocean View'. This field is required for backend organization. Use 'Show Scene Title' option to control frontend display."

