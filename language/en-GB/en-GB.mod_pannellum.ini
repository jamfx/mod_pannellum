; CONFIGURATION HINTS
; ============================================
MOD_PANNELLUM_CONFIG_MISSING_DESC="Please configure the module in the backend to display a 360° panorama."
MOD_PANNELLUM_CONFIG_MISSING_TITLE="Pannellum Module Not Yet Configured"
MOD_PANNELLUM_CONFIG_STEP1="Open the module in the backend (Content → Site Modules)"
MOD_PANNELLUM_CONFIG_STEP2="Select a display mode (Single Panorama or Multiple Scenes)"
MOD_PANNELLUM_CONFIG_STEP3="Upload at least one panorama image or add scenes"
MOD_PANNELLUM_CONFIG_STEPS="Configuration Steps:"

; ============================================
; MODE
; ============================================
MOD_PANNELLUM_MODE_DESC="Single Panorama: Displays a single 360° image with optional hotspots. Multiple Scenes: Create an interactive tour with multiple connected panoramas and navigation hotspots between scenes."
MOD_PANNELLUM_MODE_LABEL="Display Mode"
MOD_PANNELLUM_MODE_MULTI="Multiple Scenes"
MOD_PANNELLUM_MODE_SINGLE="Single Panorama"

; ============================================
; SCENES
; ============================================
MOD_PANNELLUM_SCENE_HFOV_DESC="Zoom level when entering this scene. Each scene can have its own zoom level. Default: 100°"
MOD_PANNELLUM_SCENE_HOTSPOTS_DESC="Interactive points in this scene. Scene Links: For switching to other scenes. Enter the 'Target Scene ID' of the desired scene. Ideal for doors, passages, connections. Info Points: For information and HTML content. Can contain text, images, videos. Info box size adjustable. Use the Hotspot Editor to set positions visually!"
MOD_PANNELLUM_SCENE_IMAGE="Panorama Image"
MOD_PANNELLUM_SCENE_PITCH_DESC="Vertical starting position of the camera in this scene. 0° is the standard eye level and usually the best choice."
MOD_PANNELLUM_SCENE_TITLE_DESC="Display name of this scene shown to visitors. Can contain spaces and special characters. Examples: 'Living Room', 'Kitchen (South Side)', 'Balcony with Ocean View'"
MOD_PANNELLUM_SCENE_YAW_DESC="Horizontal starting position of the camera in this scene. Determines which direction visitors look when entering the scene. Tip: Point the camera towards distinctive features or important hotspots."
MOD_PANNELLUM_SCENES_DESC="Create an interactive 360° tour with multiple panoramas: 1. Add scenes for each room/location. 2. Assign unique Scene IDs (e.g., 'livingroom', 'kitchen'). 3. Upload panorama images for each scene. 4. Connect scenes with hotspots (Type: 'Scene Link'). The first scene is automatically used as the starting point."
MOD_PANNELLUM_SCENES_LABEL="Scenes"

; ============================================
; SINGLE MODE
; ============================================
MOD_PANNELLUM_SINGLE_HOTSPOTS_DESC="Add interactive points to your panorama. Scene Hotspots: Enable navigation between different panoramas (only useful in multi-scene mode). Info Hotspots: Display information, text, images, or HTML content. Tip: Use the 'Hotspot Editor' to visually place positions instead of manually entering coordinates."
MOD_PANNELLUM_SINGLE_IMAGE_DESC="Select a 360° panorama image in Equirectangular format (also known as spherical or latitude-longitude projection). Recommended aspect ratio: 2:1 (e.g., 4096x2048 pixels). The image should show a complete 360° × 180° spherical view."
