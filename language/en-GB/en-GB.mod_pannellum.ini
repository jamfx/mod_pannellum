; ============================================
MOD_PANNELLUM_HOTSPOT_TYPE_INFO="Info Point (Information)"
MOD_PANNELLUM_HOTSPOT_TYPE_SCENE="Scene Link (Navigation)"

; ============================================
; HOTSPOTS
; ============================================
MOD_PANNELLUM_HOTSPOTS="Hotspots"

